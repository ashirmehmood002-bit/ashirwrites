<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Ashir Writes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .contact-info {
            margin-bottom: 40px;
        }

        .info-item {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
        }

        .info-icon {
            font-size: 1.5em;
            margin-right: 20px;
            color: #667eea;
            min-width: 30px;
        }

        .info-content h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.1em;
        }

        .info-content p {
            color: #666;
            font-size: 0.95em;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }

        .social-links {
            text-align: center;
            margin-top: 30px;
        }

        .social-links h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-decoration: none;
            transition: background 0.3s ease;
            font-size: 1.2em;
        }

        .social-icons a:hover {
            background: #764ba2;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .info-item {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>

        <div class="contact-info">
            <div class="info-item">
                <div class="info-icon">📍</div>
                <div class="info-content">
                    <h3>Address</h3>
                    <p>Your Location Here</p>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">📧</div>
                <div class="info-content">
                    <h3>Email</h3>
                    <p><a href="mailto:contact@ashirwrites.com" style="color: #667eea; text-decoration: none;">contact@ashirwrites.com</a></p>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">📱</div>
                <div class="info-content">
                    <h3>Phone</h3>
                    <p>+1 (XXX) XXX-XXXX</p>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">🕐</div>
                <div class="info-content">
                    <h3>Business Hours</h3>
                    <p>Monday - Friday: 9:00 AM - 5:00 PM<br>
                    Saturday - Sunday: Closed</p>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="social-links">
            <h3>Follow Us</h3>
            <div class="social-icons">
                <a href="https://twitter.com" title="Twitter">𝕏</a>
                <a href="https://linkedin.com" title="LinkedIn">in</a>
                <a href="https://github.com" title="GitHub">⚙</a>
                <a href="https://facebook.com" title="Facebook">f</a>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>
</body>
</html>
